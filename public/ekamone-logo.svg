<svg width="800" height="800" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ekamone Pure Vector Logo -->
  <defs>
    <linearGradient id="ekamone_gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D888" />
      <stop offset="35%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#80621B" />
    </linearGradient>
  </defs>

  <!-- Dark Canvas Base -->
  <rect width="100" height="100" fill="#0D0D12" />

  <!-- The Architectural Monolithic 'E' -->
  <g transform="translate(34, 25) skewX(-15)">
    <rect x="0" y="0" width="10" height="50" fill="url(#ekamone_gold)" />
    <rect x="10" y="0" width="28" height="10" fill="url(#ekamone_gold)" />
    <rect x="10" y="20" width="16" height="10" fill="url(#ekamone_gold)" />
    <rect x="10" y="40" width="28" height="10" fill="url(#ekamone_gold)" />
  </g>
</svg>
