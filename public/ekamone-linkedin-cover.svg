<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');
      .heading { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 24px; fill: #FFFFFF; letter-spacing: -0.5px; }
      .subheading { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #C9A84C; letter-spacing: 4px; }
    </style>
  </defs>

  <!-- Minimalist Obsidian Background -->
  <rect width="1128" height="191" fill="#0D0D12" />

  <!-- Subtle noise/texture overlay mimicking the main site background -->
  <path d="M 0 0 L 1128 0 L 1128 191 L 0 191 Z" fill="rgba(255,255,255,0.01)" />

  <!-- Right-Aligned Minimal Typography perfectly safe from profile picture blocking -->
  <text x="1080" y="94" class="heading" text-anchor="end">
    SYSTEMATIZE THE DEAL FLOW
  </text>
  
  <text x="1080" y="122" class="subheading" text-anchor="end">
    AI WORKFLOW SYSTEMS FOR CAPITAL TEAMS
  </text>

  <!-- Extremely subtle bottom edge glow to tie into the Ekamone theme -->
  <line x1="0" y1="189" x2="1128" y2="189" stroke="#C9A84C" stroke-width="2" opacity="0.3" />
</svg>
